<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Estima tu copago médico al instante. CopagoIA identifica la especialidad y compara hospitales de tu red de seguros."
    />
    <title>CopagoIA · Tu copago al instante</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%233943b7'/><line x1='50' y1='20' x2='50' y2='80' stroke='white' stroke-width='14' stroke-linecap='round'/><line x1='20' y1='50' x2='80' y2='50' stroke='white' stroke-width='14' stroke-linecap='round'/></svg>"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="bg-slate-100 antialiased">
    <header
      class="flex-shrink-0 sticky top-0 z-20 shadow-lg px-4 sm:px-6 py-3"
      style="background: linear-gradient(to right, #0e0e52, #150578)"
    >
      <div class="max-w-3xl mx-auto flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <button
            type="button"
            id="history-btn"
            title="Consultas recientes"
            aria-label="Consultas recientes"
            class="p-1.5 rounded-xl transition-colors flex-shrink-0 hover:bg-white/10"
            style="color: #78c0e0"
          >
            <svg
              width="19"
              height="19"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <div
            class="hidden sm:flex w-10 h-10 rounded-xl items-center justify-center shadow-md flex-shrink-0"
            style="background: #3943b7; border: 2px solid #449dd160"
          >
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 4v16m8-8H4"
              />
            </svg>
          </div>
          <div class="min-w-0 flex-1">
            <h1
              class="font-extrabold text-white text-base sm:text-lg leading-tight tracking-tight"
            >
              CopagoIA
            </h1>
            <p class="text-xs leading-tight truncate" style="color: #78c0e0">
              Powered by TDCDev · hackIAthon 2026
            </p>
          </div>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
          <button
            type="button"
            id="nueva-consulta-btn"
            title="Nueva consulta"
            aria-label="Nueva consulta"
            class="p-1.5 rounded-xl transition-colors flex-shrink-0 hover:bg-white/10"
            style="color: #78c0e0"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
              />
              <path
                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
              />
            </svg>
          </button>
          <div
            class="hidden sm:block w-px h-5 flex-shrink-0"
            style="background: #449dd130"
          ></div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <span
              class="hidden sm:inline text-xs font-semibold uppercase tracking-wide whitespace-nowrap"
              style="color: #78c0e0"
              >Mi plan</span
            >
            <div class="relative" id="plan-dropdown-wrapper">
              <button type="button" id="plan-toggle" class="plan-toggle">
                <span id="plan-label" class="plan-toggle-label">Cargando…</span>
                <svg
                  id="plan-arrow"
                  class="plan-toggle-arrow"
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="6 9 12 15 18 9" />
                </svg>
              </button>
              <ul
                id="plan-menu"
                class="plan-menu"
                role="listbox"
                aria-hidden="true"
                aria-label="Seleccionar plan"
              ></ul>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main
      class="chat-main w-full max-w-3xl mx-auto px-3 sm:px-4 pt-4 pb-3 gap-3"
    >
      <div
        id="chat"
        class="flex flex-col gap-4 overflow-y-auto px-1 pb-1"
      ></div>

      <form
        id="chat-form"
        class="chat-input-bar bg-white rounded-2xl border border-slate-200 shadow-sm flex items-center gap-1 p-1.5 flex-shrink-0"
      >
        <input
          id="chat-input"
          type="text"
          placeholder="Describe tu síntoma…"
          class="flex-1 px-3 py-2 outline-none text-slate-800 bg-transparent text-sm placeholder-slate-400 min-w-0"
          autocomplete="off"
          maxlength="500"
        />

        <div
          id="recording-indicator"
          style="display: none"
          class="flex-1 flex items-center gap-2 px-3 pointer-events-none"
        >
          <span
            class="w-2 h-2 rounded-full bg-red-500 flex-shrink-0 animate-pulse"
          ></span>
          <span class="text-sm text-slate-500">Grabando</span>
          <span
            id="recording-timer"
            class="text-sm font-mono font-semibold ml-auto pr-1"
            style="color: #dc2626"
            >0:00</span
          >
        </div>

        <div
          id="audio-preview"
          style="display: none"
          class="flex-1 flex items-center gap-2 px-2"
        >
          <button
            type="button"
            id="audio-play-btn"
            class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 text-white"
            style="background: #3943b7"
          ></button>
          <div
            class="flex-1 relative h-1.5 bg-slate-200 rounded-full overflow-hidden"
          >
            <div
              id="audio-progress-fill"
              class="h-full absolute left-0 top-0"
              style="
                width: 0%;
                background: #3943b7;
                transition: width 0.15s linear;
              "
            ></div>
          </div>
          <span
            id="audio-preview-time"
            class="text-xs font-mono text-slate-400 whitespace-nowrap flex-shrink-0"
            >0:00</span
          >
          <button
            type="button"
            id="audio-delete-btn"
            class="p-1.5 rounded-lg flex-shrink-0 text-slate-400 hover:text-red-500 hover:bg-red-50 transition-colors"
          >
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14H6L5 6" />
              <path d="M9 6V4h6v2" />
            </svg>
          </button>
        </div>

        <button
          type="button"
          id="voice-btn"
          title="Grabar nota de voz"
          aria-label="Grabar nota de voz"
          class="voice-btn p-2 rounded-xl flex-shrink-0"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="22" />
            <line x1="8" y1="22" x2="16" y2="22" />
          </svg>
        </button>
        <button
          type="submit"
          id="send-btn"
          class="send-btn text-white px-4 py-2 rounded-xl font-semibold text-sm flex-shrink-0 shadow-sm"
        >
          Enviar
        </button>
      </form>

      <p
        class="text-xs text-slate-500 text-center leading-relaxed flex-shrink-0 flex items-start justify-center gap-1.5"
      >
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#f59e0b"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="flex-shrink-0 mt-0.5"
        >
          <path
            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
          />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        <span
          >Estimación informativa —
          <strong>no reemplaza la consulta médica</strong> ni constituye
          autorización del seguro.</span
        >
      </p>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
